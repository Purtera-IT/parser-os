risk_defaults:
  fire_panel_unit_exposure: 14000
  notification_appliance_unit_exposure: 280
  smoke_detector_unit_exposure: 110
  failed_dispatch_exposure: 600
  unpriced_scope_default: 7500
  missing_permit_exposure: 5000
  missing_acceptance_test_exposure: 4500
packet_family_hints:
  vendor_mismatch:
    - device count
    - panel model mismatch
  scope_exclusion:
    - permit by others
    - power to panel by ec
    - access panels by gc
  missing_info:
    - ahj approval
    - voice intelligibility
    - acceptance test schedule
    - secondary power

detection_targets:
  - key: fire_panel
    entity_key: device:fire_panel
    aliases_from:
      - device_aliases.fire_panel
    aliases:
      - 'facp'
      - 'fire alarm control panel'
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: fire_subpanel
    entity_key: device:fire_subpanel
    aliases:
      - 'sub panel'
      - 'sub-panel'
    completeness: informational
    modalities:
      - text_tag
      - glyph_template
  - key: smoke_detector
    entity_key: device:smoke_detector
    aliases_from:
      - device_aliases.smoke_detector
