site_alias_patterns:
  - "data center\\s*\\d*"
  - "dc\\s*\\d+"
  - "branch\\s*#?\\d+"
  - "depot\\s*\\d+"
action_aliases:
  chain_of_custody:
    - maintain chain of custody
    - chain of custody
    - cocs
    - serial scan
    - asset scan
    - barcode scan
  data_destruction:
    - data destruction
    - wipe
    - sanitize
    - degauss
    - shred
    - physical destruction
    - nist 800-88
    - dod 5220
  pickup:
