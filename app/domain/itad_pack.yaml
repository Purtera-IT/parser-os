pack_id: itad
name: IT Asset Disposition / Decommission Pack
version: "2.0.0"
service_lines:
  - itad
  - decommission
  - asset_disposal
  - data_destruction
entity_types:
  - name: device
    aliases:
      - laptop
      - notebook
      - desktop
      - server
      - storage
      - switch
      - router
      - ups
      - phone
    examples: ["laptop", "rack server", "ups"]
  - name: site
    aliases:
      - data center
      - server room
      - branch
      - depot
      - warehouse
      - office
    examples: ["DC1", "Office HQ"]
