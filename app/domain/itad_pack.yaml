    - assets
    - each
    - ea
    - pallets
    - skids
    - cages
artifact_role_patterns:
  approved_site_roster:
    - asset_inventory
    - asset inventory
    - inventory list
    - serial list
    - barcode list
  vendor_quote:
    - itad quote
    - destruction quote
    - logistics quote
    - pickup quote
  test_results:
    - certificate of destruction
    - destruction certificate
    - cod
    - cocs
    - chain of custody report
risk_defaults:
  missing_chain_of_custody_exposure: 10000
  missing_certificate_of_destruction_exposure: 7500
  failed_pickup_exposure: 1500
  unpriced_scope_default: 5000
  data_breach_default_exposure: 50000
packet_family_hints:
  site_access:
    - chain of custody
    - dock access
    - escort
  scope_exclusion:
    - retain in place
    - return to leasing
    - keep on prem
  missing_info:
