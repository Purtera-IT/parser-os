pack_id: network_modernization
name: Network Infrastructure Modernization Pack
version: "1.0.0"
service_lines:
  - network_modernization
reference_ontology_path: ontology/network_modernization_ontology.yaml
entity_types:
  - name: device
    aliases: [switch, router, stack]
    examples: ["L2 access switch", "branch router"]
device_aliases:
  branch_router:
    - router
    - branch router
    - WAN router
    - edge router
  l2_switch:
    - switch
    - access switch
    - PoE switch
    - stack switch
site_alias_patterns:
  - "network closet"
  - "idf"
action_aliases:
  stack_switch: ["switch stack", "stacking"]
  console_rollout: ["console cable", "oob"]
constraint_patterns:
  access:
    - maintenance window
    - change control
exclusion_patterns:
  - out of scope
  - not in network refresh
customer_instruction_patterns:
  - please upgrade
  - hold cutover
quantity_units:
  count: [ea, each, units]
artifact_role_patterns:
  quote: ["network quote", "hardware bom"]
  license: ["dna", "subscription", "smart license"]
risk_defaults:
  branch_router_unit_exposure: 4000
  l2_switch_unit_exposure: 3500
  failed_dispatch_exposure: 400
  unpriced_scope_default: 5000
packet_family_hints:
  quantity_conflict: ["switch count", "router mismatch"]

detection_targets:
  - key: nm_switch
    entity_key: device:switch
    aliases_from:
      - device_aliases.l2_switch
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: nm_router
    entity_key: device:router
    aliases_from:
      - device_aliases.branch_router
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: nm_firewall
    entity_key: device:firewall
    aliases:
      - 'firewall'
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: nm_rack
    entity_key: device:rack
    aliases:
      - 'rack'
    completeness: informational
    modalities:
      - text_tag
      - glyph_template
  - key: nm_uplink
    entity_key: device:uplink
    aliases:
      - 'uplink'
    completeness: informational
    modalities:
      - line_run
