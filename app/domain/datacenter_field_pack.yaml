pack_id: datacenter_field
name: Datacenter Field Services Pack
version: "1.0.0"
service_lines:
  - datacenter
  - remote_hands
reference_ontology_path: ontology/datacenter_field_ontology.yaml
entity_types:
  - name: device
    aliases: [rack, pdu, cable tray]
    examples: ["42U cabinet", "rack PDU"]
device_aliases:
  server_rack:
    - server rack
    - rack cabinet
    - four-post rack
  rack_pdu:
    - rack PDU
    - metered PDU
    - power strip pdu
  tor_switch:
    - top of rack switch
    - ToR switch
    - rack switch
site_alias_patterns:
  - "data hall"
  - "cage"
action_aliases:
  rack_stack: ["rack and stack", "mount in rack"]
  remote_hands: ["smart hands", "remote hands"]
constraint_patterns:
  access:
    - badge escort
    - approved vendor list
exclusion_patterns:
  - out of scope
customer_instruction_patterns:
  - maintenance window
quantity_units:
  count: [u, ru, ea]
artifact_role_patterns:
  quote: ["datacenter quote", "rack bom"]
risk_defaults:
  server_rack_unit_exposure: 8000
  rack_pdu_unit_exposure: 1200
  tor_switch_unit_exposure: 6000
  failed_dispatch_exposure: 400
  unpriced_scope_default: 5000
packet_family_hints:
  site_access: ["escort", "badge"]

detection_targets:
  - key: dc_rack
    entity_key: device:rack
    aliases_from:
      - device_aliases.server_rack
    aliases:
      - 'rack'
      - 'cabinet'
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: rack_pdu
    entity_key: device:rack_pdu
    aliases_from:
      - device_aliases.rack_pdu
    aliases:
      - 'pdu'
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: tor_switch
    entity_key: device:tor_switch
    aliases_from:
      - device_aliases.tor_switch
    aliases:
      - 'tor'
      - 'top of rack'
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: dc_patch_panel
    entity_key: device:patch_panel
    aliases:
      - 'patch panel'
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: cable_tray
    entity_key: device:cable_tray
    aliases:
      - 'cable tray'
      - 'ladder rack'
    completeness: informational
    modalities:
      - line_run
      - vector_shape
  - key: dc_floor_tile
    entity_key: marker:floor_tile
    aliases:
      - 'floor tile'
      - 'row marker'
    completeness: informational
    modalities:
      - text_tag
  - key: power_whip
    entity_key: device:power_whip
    aliases:
      - 'power whip'
    completeness: informational
    modalities:
      - line_run
