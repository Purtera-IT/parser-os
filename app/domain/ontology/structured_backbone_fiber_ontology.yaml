  "vertical_weak_points": [
    {
      "weak_point": "Fiber and copper structured cabling share terms like backbone, drop, panel, and certification.",
      "why_it_breaks_resolution": "Low-voltage artifacts often mix Cat6 and fiber on adjacent rows with similar room endpoints.",
      "symptoms_in_artifacts": "Patch panel counts conflict, or RJ45 jacks are merged with LC ports.",
      "mitigation": "identity",
      "example_phrases": [
        "24-port patch panel",
        "fiber patch panel LC",
        "cat6 drop",
        "fiber drop to IDF",
        "cable certs",
        "OTDR cert",
        "RJ45 termination",
        "LC termination"
      ]
    },
    {
      "weak_point": "Strand count is confused with cable assembly quantity.",
      "why_it_breaks_resolution": "One 12-strand trunk may produce 12 strand records, 6 pairs, and one cable run.",
      "symptoms_in_artifacts": "Quantities multiply or divide during merge.",
      "mitigation": "packetizer",
      "example_phrases": [
        "12-strand OS2",
        "6 fiber pairs",
        "one trunk",
        "strand 1/2",
        "24F backbone",
        "pair 7 failed",
