  "relationship_types": {
    "supports": "Evidence atom reinforces the same identity, quantity, location, or scope claim.",
    "contradicts": "Evidence atom asserts an incompatible identity, quantity, location, or state for the same comparable group.",
    "excludes": "Evidence atom explicitly removes an item or task from scope.",
    "requires": "Evidence atom states a dependency that must exist for the item or task to be valid.",
    "located_in": "Evidence atom places an identity at a site, room, rack, lane, door, or work area.",
    "quoted_from": "Evidence atom is derived from a commercial quote or BOM line.",
    "derived_from": "Evidence atom is parsed or normalized from an upstream artifact, transcript, or survey.",
    "replaces": "Evidence atom states that one item supersedes, refreshes, swaps, or RMA-replaces another item.",
    "tested_by": "Evidence atom is validated by a field test, certificate, or acceptance artifact."
  },
  "normalization_principles": [
    "Fiber identities must not quantity-compare with copper drops, Cat6 runs, RJ45 terminations, or wireless AP drops.",
    "OS1, OS2, OM3, and OM4 are separate material identities even when the strand count and connector type are identical.",
    "Connector, adapter panel, patch cord, backbone run, strand pair, optic, and certification report quantities are separate comparison groups.",
    "A fiber pair is a capacity entity; it is not equal to a cable assembly, connector count, or patch panel port count.",
    "LC, SC, MPO, and MTP tokens require fiber context unless a known non-fiber expansion is present.",
    "OTDR traces and insertion-loss results govern acceptance evidence, not material quantity unless paired with a tested-link inventory.",
    "Demarc extension and service-provider handoff are scope tasks/handoffs; do not merge them with carrier circuit inventory.",
    "TBD strand count, assumed path, verify in field, per GC, and as-built pending must preserve uncertainty and should not overwrite approved BOM counts.",
    "Cross-domain confusion - AP: APC connector polish is fiber context and must not resolve to wireless AP; wireless AP is rejected by LC/SC/OS/OM context.",
    "Cross-domain confusion - switch: fiber optics may install into network switches, but network_modernization owns the switch device; this ontology owns the optic and fiber link.",
    "Cross-domain confusion - panel: fiber_patch_panel wins for fiber/LC/SC/MPO/ODF wording; electrical, antenna, and POS panels are negatives.",
    "Cross-domain confusion - gateway: media_converter can bridge copper/fiber but does not become IoT gateway, payment gateway, or WAN gateway.",
    "Cross-domain confusion - sensor: fiber monitoring sensor language is not a security sensor unless camera/access/alarm context exists.",
    "Cross-domain confusion - rack: rack-mount fiber shelf is a fiber termination; datacenter_field owns rack cabinet, U position, and PDU conflicts.",
    "Cross-domain confusion - controller: fiber has no controller identity; WLC, door controller, and POS lane controller are other ontologies.",
    "Cross-domain confusion - camera: LC/SC patch cords for cameras still remain fiber material; camera bodies belong to edge_iot_security.",
    "Cross-domain confusion - drop: fiber drop must include fiber/strand/LC/SC/OS/OM; software drop and copper data drop must split.",
    "Cross-domain confusion - cable tray: ladder tray and basket tray are datacenter/pathway assets unless specifically scoped as fiber pathway segment."
  ],
  "common_failure_modes": [
    {
      "failure": "Structured backbone fiber BOM quantities are compared against service-task counts such as visits or windows.",
      "fix_layer": "identity"
    },
    {
      "failure": "Acronyms like AP, SOW, WO, COD, GC, and FE are interpreted without artifact context.",
      "fix_layer": "parser"
    },
    {
      "failure": "Vendor quote beats approved site roster for site count, creating phantom locations.",
      "fix_layer": "authority"
    },
    {
      "failure": "Email recap changes scope but lacks approval or formal change order.",
      "fix_layer": "authority"
    },
    {
      "failure": "Line descriptions mix material, labor, and contingency in one row.",
      "fix_layer": "packetizer"
    },
    {
      "failure": "TBD, approx, assumed, per GC, or verify in field is treated as confirmed identity.",
      "fix_layer": "entity_resolver"
    },
    {
      "failure": "Serial or asset-tag inventory is merged with non-serialized accessories.",
      "fix_layer": "identity"
    },
    {
      "failure": "Cutover or freeze-window notes are interpreted as item quantities.",
      "fix_layer": "parser"
    }
  ],
