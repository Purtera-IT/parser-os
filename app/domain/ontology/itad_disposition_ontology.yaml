  "relationship_types": {
    "supports": "Evidence atom reinforces the same identity, quantity, location, or scope claim.",
    "contradicts": "Evidence atom asserts an incompatible identity, quantity, location, or state for the same comparable group.",
    "excludes": "Evidence atom explicitly removes an item or task from scope.",
    "requires": "Evidence atom states a dependency that must exist for the item or task to be valid.",
    "located_in": "Evidence atom places an identity at a site, room, rack, lane, door, or work area.",
    "quoted_from": "Evidence atom is derived from a commercial quote or BOM line.",
    "derived_from": "Evidence atom is parsed or normalized from an upstream artifact, transcript, or survey.",
    "replaces": "Evidence atom states that one item supersedes, refreshes, swaps, or RMA-replaces another item.",
    "tested_by": "Evidence atom is validated by a field test, certificate, or acceptance artifact."
  },
  "normalization_principles": [
    "ITAD disposition identities must not merge with endpoint deployment, reimage, break-fix, or refresh scope unless an artifact explicitly hands assets into disposition.",
    "Certificate of destruction, wipe attestation, recycling certificate, and chain of custody are separate compliance artifacts even when issued for the same asset.",
    "Serialize disposed assets by serial number, asset tag, custody ID, certificate ID, and pickup event; do not rely on model alone.",
    "Data wipe, secure erase, shredding, and degaussing are different destruction/sanitization methods and must remain distinct for compliance evidence.",
    "Pallet, box, bag, weight ticket, and asset count are separate comparison groups and cannot be quantity-compared directly.",
    "Resale grade and remarketing reports describe disposition outcome; they do not prove data destruction unless linked to wipe/destruction certificate evidence.",
    "Release authorization and witness signoff govern authorization/acceptance, not asset count.",
    "TBD serials, missing serial, unreadable tag, assumed pallet count, verify in field, and pending customer release create exception records rather than clean merges.",
    "Cross-domain confusion - AP: accounts payable approval and asset pickup can look like AP; ITAD owns asset pickup only with disposal/custody context.",
    "Cross-domain confusion - switch: disposed network switches are disposed assets here, but network_modernization owns active refresh/installation switch identities.",
    "Cross-domain confusion - panel: monitor panel or electrical panel in scrap is disposed asset only with ITAD/custody context; fiber/security/POS panels split otherwise.",
    "Cross-domain confusion - gateway: disposed gateways can be captured as assets, but IoT/payment/WAN gateway configuration belongs to other ontologies.",
    "Cross-domain confusion - sensor: recycled sensors are disposed assets only under custody/disposition artifacts; operational sensors belong to edge_iot_security.",
    "Cross-domain confusion - rack: rack disposal belongs here only with decommission/custody/recycling context; datacenter_field owns active rack tasks.",
    "Cross-domain confusion - controller: disposed controllers are asset records only in ITAD context; door/WLAN/POS/domain controller meanings split.",
    "Cross-domain confusion - camera: camera disposal belongs here only under ITAD custody; operational surveillance camera install belongs to edge_iot_security.",
    "Cross-domain confusion - drop: drop-off or pickup logistics is ITAD logistics only with asset disposal context; cabling drops and software drops are negatives.",
    "Cross-domain confusion - wipe: endpoint reimage/reload is deployment; NIST-style sanitization, COD, or wipe attestation is ITAD."
  ],
  "common_failure_modes": [
    {
      "failure": "ITAD disposition BOM quantities are compared against service-task counts such as visits or windows.",
      "fix_layer": "identity"
    },
    {
      "failure": "Acronyms like AP, SOW, WO, COD, GC, and FE are interpreted without artifact context.",
      "fix_layer": "parser"
    },
    {
      "failure": "Vendor quote beats approved site roster for site count, creating phantom locations.",
      "fix_layer": "authority"
    },
    {
      "failure": "Email recap changes scope but lacks approval or formal change order.",
      "fix_layer": "authority"
    },
    {
      "failure": "Line descriptions mix material, labor, and contingency in one row.",
      "fix_layer": "packetizer"
    },
    {
      "failure": "TBD, approx, assumed, per GC, or verify in field is treated as confirmed identity.",
      "fix_layer": "entity_resolver"
    },
    {
      "failure": "Serial or asset-tag inventory is merged with non-serialized accessories.",
      "fix_layer": "identity"
    },
    {
      "failure": "Cutover or freeze-window notes are interpreted as item quantities.",
      "fix_layer": "parser"
    }
  ],
