  "relationship_types": {
    "supports": "Evidence atom reinforces the same identity, quantity, location, or scope claim.",
    "contradicts": "Evidence atom asserts an incompatible identity, quantity, location, or state for the same comparable group.",
    "excludes": "Evidence atom explicitly removes an item or task from scope.",
    "requires": "Evidence atom states a dependency that must exist for the item or task to be valid.",
    "located_in": "Evidence atom places an identity at a site, room, rack, lane, door, or work area.",
    "quoted_from": "Evidence atom is derived from a commercial quote or BOM line.",
    "derived_from": "Evidence atom is parsed or normalized from an upstream artifact, transcript, or survey.",
    "replaces": "Evidence atom states that one item supersedes, refreshes, swaps, or RMA-replaces another item.",
    "tested_by": "Evidence atom is validated by a field test, certificate, or acceptance artifact."
  },
  "normalization_principles": [
    "Security camera, access control, intrusion alarm, and IoT gateway identities compare only within their own comparison groups even when all use PoE or IP addressing.",
    "Consumer smart-home, webcam, conference AV, and phone camera wording is negative context unless a commercial security artifact governs the scope.",
    "A door reader, door controller, REX device, lock, and door contact are separate identities even when one opening contains all of them.",
    "Camera counts must not be inferred from VMS channels, retention days, or NVR storage capacity without explicit inventory evidence.",
    "Access badge programming is a service task and not an access-card hardware count unless material tokens say cards or credentials are shipped.",
    "Security PoE switches are edge-specific only when camera/access-control context is present; generic switch refresh belongs to network_modernization.",
    "Motion analytics on a camera and PIR motion detector sensor are separate; resolve by camera/video versus alarm/PIR context.",
    "TBD camera views, assumed door hardware, verify in field, per GC, and pending customer approval keep location and quantity uncertainty.",
    "Cross-domain confusion - AP: access point can mean door/opening in security; wireless_access_point wins only with Wi-Fi/WLAN/SSID context.",
    "Cross-domain confusion - switch: edge_security_poe_switch wins only for camera/access-control PoE context; generic Ethernet switch belongs to network_modernization and light switch is rejected.",
    "Cross-domain confusion - panel: edge_intrusion_panel or access control panel wins for alarm/zone/door context; fiber/electrical/antenna/POS panels split.",
    "Cross-domain confusion - gateway: edge_iot_gateway_device wins for sensor/protocol/industrial edge context; payment gateway and default gateway are negatives.",
    "Cross-domain confusion - sensor: edge physical sensors win for alarm, door, environmental, leak, or PIR context; wireless RF metrics and endpoint telemetry split.",
    "Cross-domain confusion - rack: edge_security_headend_rack wins for NVR/VMS/camera headend context; datacenter_field owns rack U, PDU, and cage.",
    "Cross-domain confusion - controller: edge_door_controller wins for door/access context; WLC, POS lane controller, and domain controller are negatives.",
    "Cross-domain confusion - camera: edge_ip_security_camera wins for surveillance/CCTV/NVR/VMS context; conference camera, barcode scanner camera, and mobile phone camera are negatives.",
    "Cross-domain confusion - reader: edge_access_control_reader is door/badge context; MICR and barcode readers belong to POS commerce.",
    "Cross-domain confusion - lock: magnetic/electric door locks belong here; laptop locks belong to endpoint_imac and cash drawer locks belong to POS or facilities."
  ],
  "common_failure_modes": [
    {
      "failure": "Edge IoT security BOM quantities are compared against service-task counts such as visits or windows.",
      "fix_layer": "identity"
    },
    {
      "failure": "Acronyms like AP, SOW, WO, COD, GC, and FE are interpreted without artifact context.",
      "fix_layer": "parser"
    },
    {
      "failure": "Vendor quote beats approved site roster for site count, creating phantom locations.",
      "fix_layer": "authority"
    },
    {
      "failure": "Email recap changes scope but lacks approval or formal change order.",
      "fix_layer": "authority"
    },
    {
      "failure": "Line descriptions mix material, labor, and contingency in one row.",
      "fix_layer": "packetizer"
    },
    {
      "failure": "TBD, approx, assumed, per GC, or verify in field is treated as confirmed identity.",
      "fix_layer": "entity_resolver"
    },
    {
      "failure": "Serial or asset-tag inventory is merged with non-serialized accessories.",
      "fix_layer": "identity"
    },
    {
      "failure": "Cutover or freeze-window notes are interpreted as item quantities.",
      "fix_layer": "parser"
    }
  ],
