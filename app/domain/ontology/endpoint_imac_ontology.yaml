  "relationship_types": {
    "supports": "Evidence atom reinforces the same identity, quantity, location, or scope claim.",
    "contradicts": "Evidence atom asserts an incompatible identity, quantity, location, or state for the same comparable group.",
    "excludes": "Evidence atom explicitly removes an item or task from scope.",
    "requires": "Evidence atom states a dependency that must exist for the item or task to be valid.",
    "located_in": "Evidence atom places an identity at a site, room, rack, lane, door, or work area.",
    "quoted_from": "Evidence atom is derived from a commercial quote or BOM line.",
    "derived_from": "Evidence atom is parsed or normalized from an upstream artifact, transcript, or survey.",
    "replaces": "Evidence atom states that one item supersedes, refreshes, swaps, or RMA-replaces another item.",
    "tested_by": "Evidence atom is validated by a field test, certificate, or acceptance artifact."
  },
  "normalization_principles": [
    "Endpoint devices, peripherals, software packages, IMAC tasks, and logistics kits are separate comparison groups; do not compare a monitor count to a laptop count.",
    "IMAC means install/move/add/change when paired with workspace, user, move, add, change, or deployment context; Apple iMac hardware must resolve as endpoint_business_desktop or endpoint_conference_room_pc only when hardware context exists.",
    "ITAD, data destruction, certificate of destruction, resale, recycling, and wipe attestations are negative context and must split into itad_disposition_ontology.",
    "Endpoint image/reimage tasks are software deployment evidence; ITAD wiping is disposition evidence even if both use the word wipe.",
    "A deployment kit can contain laptop, dock, monitor, keyboard, mouse, power adapter, and ship materials; packetize when quantity conflicts matter.",
    "User signoff and floor-walk support are acceptance/support tasks, not device inventory.",
    "Serial number and asset tag merge the same endpoint only when the model and site/user assignment do not conflict.",
    "TBD user, approx seat count, assumed desk, pending customer, per GC, and verify in field preserve uncertainty and cannot govern final inventory alone.",
    "Cross-domain confusion - AP: endpoint application package may abbreviate app/AP in notes; wireless AP wins only with Wi-Fi/WLAN context.",
    "Cross-domain confusion - switch: KVM or dock switching is endpoint peripheral context; network switch belongs to network_modernization and light switch is rejected.",
    "Cross-domain confusion - panel: monitor panels are display components only; patch/electrical/security/POS panels belong elsewhere.",
    "Cross-domain confusion - gateway: endpoint VPN/client gateway references configuration only; IoT, payment, and WAN gateways split.",
    "Cross-domain confusion - sensor: endpoint telemetry sensor or laptop sensor wording is not a security sensor unless alarm/access context exists.",
    "Cross-domain confusion - rack: desk equipment is endpoint scope; datacenter racks and network rack kits split unless a conference-room rack is explicitly scoped as endpoint accessory.",
    "Cross-domain confusion - controller: domain controller or device management controller is not wireless WLC, door controller, or POS lane controller.",
    "Cross-domain confusion - camera: endpoint_webcam_peripheral wins for USB/webcam/collaboration context; surveillance cameras belong to edge_iot_security.",
    "Cross-domain confusion - drop: software drop/deployment package is not structured cabling; require cable/run/jack tokens for cabling identities.",
    "Cross-domain confusion - lock: endpoint_kensington_lock wins for laptop/device lock; mag locks and cash drawer locks are negatives."
  ],
  "common_failure_modes": [
    {
      "failure": "Endpoint IMAC BOM quantities are compared against service-task counts such as visits or windows.",
      "fix_layer": "identity"
    },
    {
      "failure": "Acronyms like AP, SOW, WO, COD, GC, and FE are interpreted without artifact context.",
      "fix_layer": "parser"
    },
    {
      "failure": "Vendor quote beats approved site roster for site count, creating phantom locations.",
      "fix_layer": "authority"
    },
    {
      "failure": "Email recap changes scope but lacks approval or formal change order.",
      "fix_layer": "authority"
    },
    {
      "failure": "Line descriptions mix material, labor, and contingency in one row.",
      "fix_layer": "packetizer"
    },
    {
      "failure": "TBD, approx, assumed, per GC, or verify in field is treated as confirmed identity.",
      "fix_layer": "entity_resolver"
    },
    {
      "failure": "Serial or asset-tag inventory is merged with non-serialized accessories.",
      "fix_layer": "identity"
    },
    {
      "failure": "Cutover or freeze-window notes are interpreted as item quantities.",
      "fix_layer": "parser"
    }
  ],
