  "relationship_types": {
    "supports": "Evidence atom reinforces the same identity, quantity, location, or scope claim.",
    "contradicts": "Evidence atom asserts an incompatible identity, quantity, location, or state for the same comparable group.",
    "excludes": "Evidence atom explicitly removes an item or task from scope.",
    "requires": "Evidence atom states a dependency that must exist for the item or task to be valid.",
    "located_in": "Evidence atom places an identity at a site, room, rack, lane, door, or work area.",
    "quoted_from": "Evidence atom is derived from a commercial quote or BOM line.",
    "derived_from": "Evidence atom is parsed or normalized from an upstream artifact, transcript, or survey.",
    "replaces": "Evidence atom states that one item supersedes, refreshes, swaps, or RMA-replaces another item.",
    "tested_by": "Evidence atom is validated by a field test, certificate, or acceptance artifact."
  },
  "normalization_principles": [
    "POS terminals, payment devices, peripherals, lane network devices, software configuration, certificates, and cutover windows are separate comparison groups.",
    "PIN pad, PED, payment terminal, and signature pad require payment or lane context; door keypads and endpoint touchpads are negatives.",
    "A lane, terminal/register, scanner, cash drawer, receipt printer, and PIN pad can co-locate at one checkout but must not merge.",
    "Store closed, after hours, blackout, cutover, and freeze windows are schedule constraints rather than installed items.",
    "Payment gateway and processor configuration are software/configuration atoms, not IoT gateways or network default gateways.",
    "Key injection and P2PE/PCI evidence require certificate or payment-security authority; do not infer from generic key or certificate words.",
    "POS lane switch belongs here only when lane/cashwrap/register context is present; generic switch refresh belongs to network_modernization.",
    "TBD lane count, approx store count, assumed cable kit, pending processor, verify in field, and as-built preserve uncertainty.",
    "Cross-domain confusion - AP: AP rarely belongs in POS except approval/accounts payable; wireless access point wins only with WLAN/Wi-Fi context.",
    "Cross-domain confusion - switch: pos_lane_network_switch wins for lane/cashwrap/register context; network access switch and light switch split.",
    "Cross-domain confusion - panel: pos_pin_pad or payment terminal panel wording is not patch/electrical/fiber panel; require payment device context.",
    "Cross-domain confusion - gateway: pos_payment_gateway_config wins for payment processor, merchant, transaction host, and acquirer wording; IoT/default gateways are negatives.",
    "Cross-domain confusion - sensor: scanner-scale and barcode scanner are POS peripherals; physical sensors belong to edge_iot_security.",
    "Cross-domain confusion - rack: cashwrap fixtures and terminal stands are POS scope; datacenter/network racks split.",
    "Cross-domain confusion - controller: pos_lane_controller wins for checkout/register/lane context; door controller, WLC, and domain controller split.",
    "Cross-domain confusion - camera: barcode scanner imager is not a security camera unless CCTV/NVR context exists.",
    "Cross-domain confusion - reader: MICR, gift card, mag stripe, and payment readers are POS; badge/access readers belong to edge_iot_security.",
    "Cross-domain confusion - terminal: POS terminal wins in store/lane/checkout/payment context; serial terminal and airport terminal are negatives."
  ],
  "common_failure_modes": [
    {
      "failure": "POS commerce BOM quantities are compared against service-task counts such as visits or windows.",
      "fix_layer": "identity"
    },
    {
      "failure": "Acronyms like AP, SOW, WO, COD, GC, and FE are interpreted without artifact context.",
      "fix_layer": "parser"
    },
    {
      "failure": "Vendor quote beats approved site roster for site count, creating phantom locations.",
      "fix_layer": "authority"
    },
    {
      "failure": "Email recap changes scope but lacks approval or formal change order.",
      "fix_layer": "authority"
    },
    {
      "failure": "Line descriptions mix material, labor, and contingency in one row.",
      "fix_layer": "packetizer"
    },
    {
      "failure": "TBD, approx, assumed, per GC, or verify in field is treated as confirmed identity.",
      "fix_layer": "entity_resolver"
    },
    {
      "failure": "Serial or asset-tag inventory is merged with non-serialized accessories.",
      "fix_layer": "identity"
    },
    {
      "failure": "Cutover or freeze-window notes are interpreted as item quantities.",
      "fix_layer": "parser"
    }
  ],
