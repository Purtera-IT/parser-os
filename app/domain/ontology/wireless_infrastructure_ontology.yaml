  "relationship_types": {
    "supports": "Evidence atom reinforces the same identity, quantity, location, or scope claim.",
    "contradicts": "Evidence atom asserts an incompatible identity, quantity, location, or state for the same comparable group.",
    "excludes": "Evidence atom explicitly removes an item or task from scope.",
    "requires": "Evidence atom states a dependency that must exist for the item or task to be valid.",
    "located_in": "Evidence atom places an identity at a site, room, rack, lane, door, or work area.",
    "quoted_from": "Evidence atom is derived from a commercial quote or BOM line.",
    "derived_from": "Evidence atom is parsed or normalized from an upstream artifact, transcript, or survey.",
    "replaces": "Evidence atom states that one item supersedes, refreshes, swaps, or RMA-replaces another item.",
    "tested_by": "Evidence atom is validated by a field test, certificate, or acceptance artifact."
  },
  "normalization_principles": [
    "Compare quantities only within identical comparison_group values; AP devices, mounts, drops, licenses, surveys, and cutover windows are not interchangeable.",
    "Resolve AP as wireless_access_point only when wireless, Wi-Fi, WLAN, radio, SSID, or PoE-to-AP context is present; otherwise treat AP as ambiguous.",
    "Treat survey artifacts as scope evidence but not as installed material unless an authority artifact says the survey count is the approved count.",
    "Keep RSSI, SNR, noise floor, and channel plan as measurements/configuration; never merge them into device inventory.",
    "When a BOM line says AP plus mount plus license bundle, packetize into separate comparable identities if quantities can govern independently.",
    "Ceiling grid, lift, escort, after hours, and badge terms are access constraints, not installed items.",
    "TBD, approx, assumed, per GC, verify in field, and pending customer downgrade confidence and require field verification before merge.",
    "AP serial number, MAC address, and hostname can resolve the same device only when site/location also matches or an approved inventory maps them.",
    "Cross-domain confusion - AP: wireless_access_point wins only in Wi-Fi/WLAN/SSID/RSSI/PoE-to-AP context; accounts payable or application server context must be rejected.",
    "Cross-domain confusion - switch: wireless docs may mention a PoE switch as a power source, but network modernization owns network_layer2_access_switch unless the line is explicitly AP power budget only.",
    "Cross-domain confusion - panel: wireless_directional_panel_antenna wins for RF/antenna/sector wording; patch panel, electrical panel, and POS panel are negative context.",
    "Cross-domain confusion - gateway: wireless captive portal or internet gateway text is configuration unless the artifact is network or POS gateway scope.",
    "Cross-domain confusion - sensor: wireless spectrum or RF sensor language is measurement only; edge_iot_security owns security sensors and BLE/IoT hubs.",
    "Cross-domain confusion - rack: wireless rack wording normally points to controller placement; datacenter_field owns rack U, rack elevation, and PDU.",
    "Cross-domain confusion - controller: wireless_wlan_controller wins for WLC/WLAN/radio context; door controller, POS lane controller, and domain controller must split.",
    "Cross-domain confusion - camera: camera coverage, camera mount, or NVR language belongs to edge_iot_security even when PoE is present.",
    "Cross-domain confusion - drop: wireless_ap_data_drop wins only when AP/Wi-Fi/ceiling location is present; software drop and POS cash drop are negative tokens.",
    "Cross-domain confusion - license: wireless_cloud_wlan_subscription is AP/WLAN management only; endpoint security, network feature, and payment software licenses remain separate."
  ],
  "common_failure_modes": [
    {
      "failure": "Wireless infrastructure BOM quantities are compared against service-task counts such as visits or windows.",
      "fix_layer": "identity"
    },
    {
      "failure": "Acronyms like AP, SOW, WO, COD, GC, and FE are interpreted without artifact context.",
      "fix_layer": "parser"
    },
    {
      "failure": "Vendor quote beats approved site roster for site count, creating phantom locations.",
      "fix_layer": "authority"
    },
    {
      "failure": "Email recap changes scope but lacks approval or formal change order.",
      "fix_layer": "authority"
    },
    {
      "failure": "Line descriptions mix material, labor, and contingency in one row.",
      "fix_layer": "packetizer"
    },
    {
      "failure": "TBD, approx, assumed, per GC, or verify in field is treated as confirmed identity.",
      "fix_layer": "entity_resolver"
    },
    {
      "failure": "Serial or asset-tag inventory is merged with non-serialized accessories.",
      "fix_layer": "identity"
    },
    {
      "failure": "Cutover or freeze-window notes are interpreted as item quantities.",
      "fix_layer": "parser"
    }
  ],
