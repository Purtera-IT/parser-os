  "normalization_principles": [
    "This ontology owns routers, switches, network feature licenses, configuration tasks, and cutover evidence; wireless APs, POS lanes, cameras, and endpoints split out.",
    "Switch quantities compare only with network_switch_each or network_stack_member_each as appropriate; stack cables, optics, licenses, and rack kits are separate groups.",
    "Do not merge a switch port count with switch device count; port, VLAN, and interface references are configuration atoms.",
    "Generic feature-license and subscription-entitlement wording must remain vendor-neutral and not infer proprietary product families without explicit source text.",
    "Console, OOB, IP plan, DHCP, DNS, QoS, and NTP lines are configuration/service tasks unless a BOM line explicitly prices hardware.",
    "RMA language replaces or swaps an existing device and should not increment net-new inventory unless the authority artifact says add.",
    "Maintenance windows, freeze windows, and rollback plans are schedule/control artifacts, not material quantities.",
    "TBD IPs, assumed ports, verify in field, and pending carrier handoff preserve uncertainty until approved design or as-built inventory resolves them.",
    "Cross-domain confusion - AP: access point belongs to wireless; in network docs AP may appear as powered endpoint but network owns only switch/router/port evidence.",
    "Cross-domain confusion - switch: network_layer2_access_switch or network_layer3_core_switch wins for Ethernet, VLAN, uplink, stack, or port context; light/POS/KVM switches are negatives.",
    "Cross-domain confusion - panel: patch panel belongs to structured cabling or fiber, not network modernization unless clearly part of a switch rack kit note.",
    "Cross-domain confusion - gateway: payment_gateway_config belongs to POS, IoT gateway belongs to edge_iot_security, WAN gateway address remains network_ip_address_plan unless a physical gateway device is quoted.",
    "Cross-domain confusion - sensor: SNMP monitoring can observe sensors but edge_iot_security owns physical sensors.",
    "Cross-domain confusion - rack: network_rack_mount_kit is accessory; datacenter_field owns rack cabinets, U positions, and rack elevations.",
    "Cross-domain confusion - controller: wireless WLC, door controller, and POS lane controller are not network routers or switches.",
    "Cross-domain confusion - camera: PoE camera switchport evidence does not create camera identity; camera hardware belongs to edge_iot_security.",
    "Cross-domain confusion - drop: port migration or software drop is not a copper/fiber cabling drop; require cabling tokens for cabling identities.",
    "Cross-domain confusion - license: network_feature_license and network_subscription_entitlement require switch/router/network feature context, not AP management or endpoint security."
