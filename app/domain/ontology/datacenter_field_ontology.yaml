  "relationship_types": {
    "supports": "Evidence atom reinforces the same identity, quantity, location, or scope claim.",
    "contradicts": "Evidence atom asserts an incompatible identity, quantity, location, or state for the same comparable group.",
    "excludes": "Evidence atom explicitly removes an item or task from scope.",
    "requires": "Evidence atom states a dependency that must exist for the item or task to be valid.",
    "located_in": "Evidence atom places an identity at a site, room, rack, lane, door, or work area.",
    "quoted_from": "Evidence atom is derived from a commercial quote or BOM line.",
    "derived_from": "Evidence atom is parsed or normalized from an upstream artifact, transcript, or survey.",
    "replaces": "Evidence atom states that one item supersedes, refreshes, swaps, or RMA-replaces another item.",
    "tested_by": "Evidence atom is validated by a field test, certificate, or acceptance artifact."
  },
  "normalization_principles": [
    "Datacenter rack assets, power components, cable pathways, network devices, work orders, access constraints, and smart-hands tasks are separate comparison groups.",
    "Rack cabinet count, U position count, PDU count, outlet count, and server rail kit count must never quantity-compare directly.",
    "Top-of-rack switches in DC context belong here as datacenter field assets; branch/access switch modernization belongs to network_modernization.",
    "Fiber harness/trunk inside a datacenter rack/cage stays datacenter_field when tied to rack elevation/TOR/cage; campus fiber backbone belongs to structured_backbone_fiber.",
    "Smart hands, remote hands, work orders, and tickets are service events; they do not prove hardware quantity without linked inventory or rack elevation.",
    "Badge, escort, after hours, lift gate, and delivery appointment are access/logistics constraints, not installed assets.",
    "Decommission pull and disk pull are DC tasks; ITAD certificates and destruction evidence must resolve in itad_disposition.",
    "TBD U position, assumed outlet, pending MMR, verify in field, as-built, per colo, and pending customer preserve uncertainty and cannot overwrite approved rack elevations alone.",
    "Cross-domain confusion - AP: access point rarely applies in DC; APC in fiber polish or A/P power feed must not emit wireless AP.",
    "Cross-domain confusion - switch: dc_top_of_rack_switch wins in rack/U/TOR/leaf/server context; network_modernization owns branch/access switch refresh.",
    "Cross-domain confusion - panel: dc_blanking_panel or dc_copper_patch_panel wins by rack/U/RJ45 context; fiber, electrical, antenna, and POS panels split.",
    "Cross-domain confusion - gateway: DC may host gateway devices but this ontology owns rack/field placement, not payment or IoT gateway configuration.",
    "Cross-domain confusion - sensor: DC environmental sensors belong to edge_iot_security unless scoped as rack monitoring accessory in DC work order.",
    "Cross-domain confusion - rack: dc_server_rack_cabinet wins for datacenter/cabinet/U/PDU context; retail/clothing/refrigeration rack is rejected.",
    "Cross-domain confusion - controller: DC terminal server/KVM controller language does not become door controller, WLC, or POS lane controller.",
    "Cross-domain confusion - camera: security cameras in a datacenter are edge_iot_security devices; DC only owns rack/cable/power field tasks.",
    "Cross-domain confusion - drop: DC cable pull/drop tasks require rack/port/pathway context; software drop and retail drop ship are negatives.",
    "Cross-domain confusion - hands: smart hands in datacenter context wins here; store field engineer dispatch belongs to the vertical being deployed."
  ],
  "common_failure_modes": [
    {
      "failure": "Datacenter field BOM quantities are compared against service-task counts such as visits or windows.",
      "fix_layer": "identity"
    },
    {
      "failure": "Acronyms like AP, SOW, WO, COD, GC, and FE are interpreted without artifact context.",
      "fix_layer": "parser"
    },
    {
      "failure": "Vendor quote beats approved site roster for site count, creating phantom locations.",
      "fix_layer": "authority"
    },
    {
      "failure": "Email recap changes scope but lacks approval or formal change order.",
      "fix_layer": "authority"
    },
    {
      "failure": "Line descriptions mix material, labor, and contingency in one row.",
      "fix_layer": "packetizer"
    },
    {
      "failure": "TBD, approx, assumed, per GC, or verify in field is treated as confirmed identity.",
      "fix_layer": "entity_resolver"
    },
    {
      "failure": "Serial or asset-tag inventory is merged with non-serialized accessories.",
      "fix_layer": "identity"
    },
    {
      "failure": "Cutover or freeze-window notes are interpreted as item quantities.",
      "fix_layer": "parser"
    }
  ],
