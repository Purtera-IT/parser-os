pack_id: pos_commerce
name: POS and Commerce Rollout Pack
version: "1.0.0"
service_lines:
  - pos
  - commerce
reference_ontology_path: ontology/pos_commerce_ontology.yaml
entity_types:
  - name: device
    aliases: [terminal, pin pad, drawer, scanner]
    examples: ["POS terminal", "PIN pad"]
device_aliases:
  pos_register:
    - POS terminal
    - register
    - checkout terminal
    - lane terminal
  pos_pin_pad:
    - PIN pad
    - pinpad
    - payment device
    - PED
  cash_drawer:
    - cash drawer
    - till drawer
site_alias_patterns:
  - "front end"
  - "checkout lane"
action_aliases:
  cutover: ["cutover", "go-live", "freeze"]
constraint_patterns:
  access:
    - after hours
    - store close
exclusion_patterns:
  - out of scope
customer_instruction_patterns:
  - pilot store
  - wave rollout
quantity_units:
  count: [lanes, stores, each]
artifact_role_patterns:
  quote: ["POS quote", "payment hardware"]
risk_defaults:
  pos_register_unit_exposure: 4500
  pos_pin_pad_unit_exposure: 800
  cash_drawer_unit_exposure: 350
  failed_dispatch_exposure: 400
  unpriced_scope_default: 5000
packet_family_hints:
  quantity_conflict: ["lane count", "terminal mismatch"]

detection_targets:
  - key: pos_terminal
    entity_key: device:pos_terminal
    aliases_from:
      - device_aliases.pos_terminal
    aliases:
      - 'register'
      - 'pos'
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: pin_pad
    entity_key: device:pin_pad
    aliases_from:
      - device_aliases.pin_pad
    aliases:
      - 'payment device'
      - 'pin entry'
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: receipt_printer
    entity_key: device:receipt_printer
    aliases:
      - 'printer'
    completeness: informational
    modalities:
      - text_tag
      - glyph_template
  - key: scanner
    entity_key: device:scanner
    aliases:
      - 'barcode scanner'
    completeness: informational
    modalities:
      - text_tag
      - glyph_template
  - key: cash_drawer
    entity_key: device:cash_drawer
    aliases_from:
      - device_aliases.cash_drawer
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: pos_data_drop
    entity_key: device:data_drop
    aliases:
      - 'data drop'
      - 'data jack'
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: pos_power_outlet
    entity_key: device:receptacle
    aliases:
      - 'outlet'
      - 'receptacle'
    completeness: informational
    modalities:
      - text_tag
      - glyph_template
