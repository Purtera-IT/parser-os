pack_id: access_control
name: Physical Access Control / PACS Pack
version: "1.0.0"
service_lines:
  - access_control
  - pacs
  - door_security
entity_types:
  - name: device
    aliases:
      - reader
      - controller
      - panel
      - strike
      - lock
      - rex
      - request to exit
      - door contact
      - door position switch
    examples: ["HID Reader", "Mercury Panel", "Mag Lock"]
  - name: site
    aliases:
      - site
      - building
      - bldg
      - floor
      - door
      - opening
    examples: ["Bldg A", "Door 101"]
  - name: door
    aliases:
      - door
      - opening
      - gate
      - turnstile
      - mantrap
      - vestibule
    examples: ["Door 101", "Main Lobby Mantrap"]
device_aliases:
  card_reader:
    - reader
    - card reader
    - prox reader
    - badge reader
    - access reader
    - hid reader
    - hid signo
    - hid iclass
    - mobile reader
    - mobile credential reader
    - bluetooth reader
    - mifare reader
    - desfire reader
    - osdp reader
    - multi-format reader
    - keypad reader
    - keypad
    - pin pad
    - pinpad
    - biometric reader
    - fingerprint reader
    - face reader
    - facial reader
    - palm reader
  controller:
    - access controller
    - door controller
    - access control panel
    - acu
    - intelligent controller
    - mercury controller
    - lenel controller
    - software house controller
    - ccure controller
    - genetec synergis
    - amag controller
    - brivo controller
  electric_strike:
    - electric strike
    - es
    - 12vdc strike
    - 24vdc strike
    - electrified strike
  mag_lock:
    - mag lock
    - maglock
    - magnetic lock
    - electromagnetic lock
    - shear lock
    - 600lb maglock
    - 1200lb maglock
  electrified_lockset:
    - electrified mortise
    - electrified cylindrical
    - electrified lockset
    - electrified panic bar
    - exit device
    - panic bar
    - crash bar
    - prox lock
    - wireless lock
    - aperio lock
  rex_button:
    - rex
    - request to exit
    - rex button
    - rex sensor
    - pir rex
    - touch sensor rex
    - push to exit
    - exit button
    - emergency exit
  door_contact:
    - door contact
    - door position switch
    - dps
    - magnetic contact
    - balanced contact
    - high security contact
  power_supply:
    - power supply
    - access power supply
    - 12vdc power
    - 24vdc power
