  cable:
    - 22/4
    - 22/6
    - 18/4
    - 16/2
    - access control cable
    - composite cable
    - osdp cable
  enclosure:
    - access control enclosure
    - panel enclosure
    - mercury enclosure
    - powerbox
  credential:
    - credential
    - card
    - badge
    - fob
    - key fob
    - mobile credential
    - apple wallet credential
    - google wallet credential
    - hid mobile id
site_alias_patterns:
  - "door\\s*\\d+"
  - "opening\\s*\\d+"
  - "bldg\\s*[a-z]"
  - "main[-_ ]lobby"
action_aliases:
  install_door:
    - install door
    - prep door
    - prep opening
    - certify opening
  cabling:
    - pull access cable
    - run access cable
    - terminate strike
    - terminate reader
  programming:
    - program reader
    - enroll reader
    - assign door
    - door schedule
    - schedule access
constraint_patterns:
  fire_code:
    - fire code
    - life safety
    - life-safety
    - egress
    - free egress
    - delayed egress
    - nfpa 80
    - nfpa 101
    - hardware listing
    - ul listing
  compliance:
    - hipaa zone
    - cjis
    - ferpa
    - nist 800-53
    - tsa
  access:
    - escort required
    - badge required
    - mdf access
    - secure room
    - vault
    - data hall
exclusion_patterns:
  - by door hardware vendor
  - by dh vendor
  - by gc
  - by ec
  - by general contractor
  - by electrical contractor
  - by locksmith
  - by others
  - existing reader reuse
  - existing controller reuse
  - existing strike reuse
  - existing wiring reuse
  - reader hardware by others
  - lockset by others
  - power supply by others
  - rex by others
  - cabling by others
  - dps by others
  - door prep by others
  - software license by others
  - subscription by others
  - tbd
  - allowance
  - alternate
  - nic
customer_instruction_patterns:
  - please add door
  - please remove door
  - please integrate with vms
  - please integrate with intercom
  - approved to proceed
  - go ahead
  - we want osdp
  - we want mobile credentials
  - we want apple wallet
quantity_units:
  count:
    - readers
    - doors
    - openings
    - controllers
    - panels
    - units
    - ea
artifact_role_patterns:
  approved_site_roster:
    - door_schedule
    - door schedule
    - opening_schedule
    - reader_schedule
    - hardware_schedule
  vendor_quote:
    - access control quote
    - lenel quote
    - ccure quote
    - genetec quote
    - amag quote
    - brivo quote
    - openpath quote
risk_defaults:
  reader_unit_exposure: 350
  controller_unit_exposure: 1500
  strike_unit_exposure: 250
  maglock_unit_exposure: 280
  failed_dispatch_exposure: 450
  unpriced_scope_default: 5500
  missing_door_prep_exposure: 600
  missing_life_safety_relay_exposure: 1500
packet_family_hints:
  vendor_mismatch:
    - reader count
    - controller count
    - door count mismatch
  scope_exclusion:
    - door prep by others
    - power supply by others
    - lockset by others
  missing_info:
    - life safety
    - osdp
    - mobile credential
    - integration

detection_targets:
  - key: card_reader
    entity_key: device:card_reader
    aliases_from:
      - device_aliases.card_reader
    aliases:
      - 'card reader'
      - 'prox reader'
      - 'keypad reader'
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: ac_controller
    entity_key: device:ac_controller
    aliases_from:
      - device_aliases.controller
    aliases:
      - 'controller'
      - 'access panel'
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: rex_device
    entity_key: device:rex
    aliases_from:
      - device_aliases.rex_button
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: door_contact
    entity_key: device:door_contact
    aliases_from:
      - device_aliases.door_contact
    aliases:
      - 'dps'
      - 'door position switch'
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: electric_strike
    entity_key: device:electric_strike
    aliases_from:
      - device_aliases.electric_strike
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: mag_lock
    entity_key: device:mag_lock
    aliases_from:
      - device_aliases.mag_lock
    completeness: load_bearing
    modalities:
      - text_tag
      - glyph_template
  - key: ac_power_supply
    entity_key: device:power_supply
    aliases:
      - 'power supply'
      - 'psu'
    completeness: informational
    modalities:
      - text_tag
      - glyph_template
  - key: ac_junction
    entity_key: device:junction_box
    aliases:
      - 'junction box'
      - 'jb'
    completeness: informational
    modalities:
      - text_tag
      - glyph_template
